<!DOCTYPE html>
<html>
<button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
<head>
<title>Todo App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Todo List</h1>


<input type="text" id="taskInput" placeholder="Add a new task">
<input type="date" id="dueDate">
<button onclick="addTask()">Add</button>
<button onclick="clearCompleted()">Clear Completed</button>
<button onclick="markAllComplete()">Mark All Complete</button>
<button onclick="clearAllTasks()">Clear All</button>

   <!-- FILTER BUTTONS -->
    <div id="filters">
        <button id="filter-all" onclick="setFilter('all')">All</button>
        <button id="filter-active" onclick="setFilter('active')">Active</button>
        <button id="filter-completed" onclick="setFilter('completed')">Completed</button>
    </div>

<ul id="taskList"></ul>
<p id="taskCount"></p>


<script src="script.js"></script>

</body>
