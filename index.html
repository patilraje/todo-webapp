<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app-shell">
    <button class="theme-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <main class="todo-card">
        <h1>My Todo List</h1>

        <section class="input-row">
            <input type="text" id="taskInput" placeholder="Add a new task">
            <input type="date" id="dueDate">
            <button onclick="addTask()">Add</button>
        </section>

        <section class="actions-row">
            <button onclick="clearCompleted()">Clear Completed</button>
            <button onclick="markAllComplete()">Mark All Complete</button>
            <button onclick="clearAllTasks()">Clear All</button>
        </section>

        <div id="filters">
            <button id="filter-all" onclick="setFilter('all')">All</button>
            <button id="filter-active" onclick="setFilter('active')">Active</button>
            <button id="filter-completed" onclick="setFilter('completed')">Completed</button>
        </div>

        <section class="progress-section">
            <div class="progress-header">
                <span>Today's Progress</span>
                <strong id="progressLabel">0%</strong>
            </div>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </section>

        <ul id="taskList"></ul>
        <p id="taskCount"></p>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
